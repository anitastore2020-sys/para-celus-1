<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galería de Productos Editable</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --accent: #9f1239;
    --accent2: #be185d;
    --ink: #22161a;
    --muted: #7b5a63;
  }

  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: 'Manrope', sans-serif;
    background: linear-gradient(180deg, #fff0f5, #ffe4ec);
    color: var(--ink);
  }

  .wrap { width: min(95%, 1420px); margin: 0 auto; }

  header { 
    position: sticky; 
    top: 0; 
    background: rgba(255,240,245,0.95); 
    backdrop-filter: blur(12px); 
    z-index: 100; 
    border-bottom: 1px solid #f8d7e6; 
  }
  .topbar { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 14px 0; 
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand { display: flex; align-items: center; gap: 12px; font-size: 1.6rem; font-weight: 700; }

  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 50px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.95rem;
  }
  .btn-primary { background: var(--ink); color: white; }
  .btn-secondary { background: white; border: 1px solid #ddd; }
  .btn-accent { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-danger { background: #c02639; color: white; }

  .banner { width: 100%; border-radius: 18px; overflow: hidden; margin: 15px 0; }
  .banner img { width: 100%; display: block; }

  .category-section { margin-bottom: 50px; }
  .category-section h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.3rem;
    color: var(--accent2);
    text-align: center;
    margin-bottom: 25px;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
  }

  .product {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  }

  .product-media { height: 220px; background: #f8e8ee; position: relative; }
  .product-media img { width: 100%; height: 100%; object-fit: cover; }

  .stock-badge {
    position: absolute; top: 10px; right: 10px;
    padding: 5px 10px; border-radius: 30px; font-size: 0.75rem;
  }

  .product-body { padding: 14px; }
  .product-title { font-size: 1.1rem; margin-bottom: 6px; }
  .product-desc { font-size: 0.9rem; color: var(--muted); margin-bottom: 10px; }
  .price { font-size: 1.2rem; font-weight: 700; color: var(--accent); }

  .admin-only { display: none; }
  .admin-on .admin-only { display: inline-block !important; }

  /* ==================== RESPONSIVE ==================== */
  @media (max-width: 1024px) { .products { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 768px) { 
    .products { grid-template-columns: repeat(2, 1fr); }
    .category-section h2 { font-size: 2rem; }
  }
  @media (max-width: 480px) { 
    .products { grid-template-columns: 1fr; }
    .topbar { flex-direction: column; align-items: stretch; }
    .brand { justify-content: center; }
  }

  .cart {
    position: fixed;
    right: -450px;
    top: 0;
    width: 450px;
    height: 100vh;
    background: white;
    box-shadow: -10px 0 40px rgba(0,0,0,0.2);
    transition: 0.4s;
    z-index: 300;
    overflow-y: auto;
  }
  .cart.open { right: 0; }

  @media (max-width: 480px) {
    .cart { width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <h1>Galería de Productos</h1>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
        <button id="adminToggleBtn" class="btn btn-secondary">Modo Admin: OFF</button>
        <button id="openAddBtn" class="btn btn-primary admin-only">+ Agregar</button>
        <button id="cartBtn" class="btn btn-accent">Carrito (<span id="cartCount">0</span>)</button>
      </div>
    </div>
  </header>

  <div class="banner"><img src="https://drive.google.com/thumbnail?id=1y9G3V07EDFKqmyMjmfsNLjh47DGkUVVK&sz=w1920"></div>
  <div class="banner"><img src="https://drive.google.com/thumbnail?id=1uZ4L0fhQlnULPaMtyDYD5YbAIT7EamwU&sz=w1920"></div>

  <div id="productsContainer"></div>
</div>

<!-- Carrito -->
<div class="cart" id="cartPanel">
  <h2 style="padding:20px; border-bottom:1px solid #ddd;">Tu Carrito</h2>
  <div id="cartItems" style="padding:15px 20px;"></div>
  <div style="padding:20px; border-top:1px solid #ddd; position:sticky; bottom:0; background:white;">
    <h3>Total: <span id="cartTotal">0.00</span> Bs</h3>
    <button onclick="sendToWhatsapp()" class="btn btn-accent" style="width:100%; margin-top:15px; padding:14px;">Enviar por WhatsApp</button>
  </div>
</div>

<!-- Diálogo -->
<dialog id="productDialog" style="width:92%; max-width:650px; border:none; border-radius:20px; padding:0;">
  <div style="padding:25px;">
    <h3 id="dialogTitle">Agregar Producto</h3>
    <form id="productForm">
      <input id="title" type="text" placeholder="Título del producto" required style="width:100%; padding:12px; margin:8px 0;">
      <select id="fontStyle" style="width:100%; padding:12px; margin:8px 0;">
        <option value="font-style-1">Elegante</option>
        <option value="font-style-2">Moderna</option>
        <option value="font-style-3">Editorial</option>
        <option value="font-style-4">Fuerte</option>
      </select>
      <input id="category" type="text" placeholder="Categoría" required style="width:100%; padding:12px; margin:8px 0;">
      <input id="price" type="number" step="0.01" placeholder="Precio Normal (Bs)" style="width:100%; padding:12px; margin:8px 0;">
      <input id="offerPrice" type="number" step="0.01" placeholder="Precio Oferta (Bs)" style="width:100%; padding:12px; margin:8px 0;">
      <input id="wholesalePrice" type="number" step="0.01" placeholder="Precio Mayorista (Bs)" style="width:100%; padding:12px; margin:8px 0;">
      <input id="stock" type="number" placeholder="Stock disponible" style="width:100%; padding:12px; margin:8px 0;">
      <textarea id="description" placeholder="Descripción" rows="4" style="width:100%; padding:12px; margin:8px 0;"></textarea>
      <textarea id="mediaLinks" placeholder="Links de imágenes/videos/GIFs (uno por línea)" rows="5" style="width:100%; padding:12px; margin:8px 0;"></textarea>

      <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        <button type="button" class="btn btn-secondary" onclick="closeDialog()">Cancelar</button>
      </div>
    </form>
  </div>
</dialog>

<script>
// ==================== ESTADO ====================
let adminMode = false;
let products = JSON.parse(localStorage.getItem('products_v27')) || [];
let cart = JSON.parse(localStorage.getItem('cart_v27')) || [];
let editingId = null;

function convertDriveUrl(url) {
  if (!url) return '';
  if (url.includes("thumbnail?id=")) return url;
  const match = url.match(/[-\w]{25,}/);
  return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=w800` : url;
}

// ==================== RENDER ====================
function renderProducts() {
  const container = document.getElementById('productsContainer');
  container.innerHTML = '';

  const grouped = products.reduce((acc, p) => {
    const cat = (p.category || "Sin categoría").trim();
    if (!acc[cat]) acc[cat] = [];
    acc[cat].push(p);
    return acc;
  }, {});

  Object.keys(grouped).forEach(cat => {
    let html = `<div class="category-section"><h2>${cat}</h2><div class="products">`;
    grouped[cat].forEach(p => {
      const img = p.media && p.media[0] ? convertDriveUrl(p.media[0]) : '';
      const inStock = p.stock > 0;

      html += `
        <div class="product">
          <div class="product-media">
            ${img ? `<img src="${img}" loading="lazy">` : ''}
            <span class="stock-badge" style="background:${inStock ? '#166534' : '#991b1b'}; color:white;">
              ${inStock ? 'Disponible' : 'Sin stock'}
            </span>
          </div>
          <div class="product-body">
            <h3 class="product-title">${p.title}</h3>
            <p class="product-desc">${p.description || ''}</p>
            <p class="price">${Number(p.price || 0).toFixed(2)} Bs</p>
            
            <button class="btn btn-primary" onclick="addToCart('${p.id}')" style="width:100%; margin-top:10px;" ${!inStock ? 'disabled' : ''}>
              ${inStock ? 'Agregar al carrito' : 'Sin stock'}
            </button>

            ${adminMode ? `
            <div style="display:flex; gap:8px; margin-top:8px;">
              <button class="btn btn-secondary" onclick="editProduct('${p.id}')" style="flex:1;">Editar</button>
              <button class="btn btn-danger" onclick="deleteProduct('${p.id}')" style="flex:1;">Eliminar</button>
            </div>` : ''}
          </div>
        </div>`;
    });
    html += `</div></div>`;
    container.innerHTML += html;
  });
}

// ==================== CARRITO ====================
function addToCart(id) {
  const product = products.find(p => p.id === id);
  if (!product || product.stock <= 0) return alert("Sin stock disponible");

  const existing = cart.find(item => item.id === id);
  if (existing) existing.qty += 1;
  else cart.push({ ...product, qty: 1 });

  product.stock -= 1;

  localStorage.setItem('products_v27', JSON.stringify(products));
  localStorage.setItem('cart_v27', JSON.stringify(cart));

  renderProducts();
  updateCartCount();
  document.getElementById('cartPanel').classList.add('open');
  renderCart();
}

function updateCartCount() {
  const count = cart.reduce((sum, item) => sum + (item.qty || 0), 0);
  document.getElementById('cartCount').textContent = count;
}

function renderCart() {
  const container = document.getElementById('cartItems');
  let total = 0;

  if (cart.length === 0) {
    container.innerHTML = `<p style="text-align:center; color:#999; padding:40px;">El carrito está vacío</p>`;
    document.getElementById('cartTotal').textContent = "0.00";
    return;
  }

  let html = '';
  cart.forEach((item, index) => {
    const subtotal = (item.price || 0) * (item.qty || 1);
    total += subtotal;
    html += `
      <div style="display:flex; gap:15px; margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid #eee;">
        <img src="${item.media?.[0] ? convertDriveUrl(item.media[0]) : ''}" style="width:85px; height:85px; object-fit:cover; border-radius:12px;">
        <div style="flex:1;">
          <h4>${item.title}</h4>
          <p>${(item.price || 0).toFixed(2)} Bs c/u</p>
          <div style="margin-top:8px;">
            <button onclick="changeQty(${index}, -1)" style="width:30px;">−</button>
            <strong style="margin:0 12px;">${item.qty}</strong>
            <button onclick="changeQty(${index}, 1)" style="width:30px;">+</button>
          </div>
        </div>
        <div style="text-align:right;">
          <p><strong>${subtotal.toFixed(2)} Bs</strong></p>
          <button onclick="removeFromCart(${index})" class="btn btn-danger" style="padding:5px 12px;">Quitar</button>
        </div>
      </div>`;
  });

  container.innerHTML = html;
  document.getElementById('cartTotal').textContent = total.toFixed(2);
}

function changeQty(index, delta) {
  const item = cart[index];
  const product = products.find(p => p.id === item.id);
  if (!product) return;

  const newQty = item.qty + delta;
  if (newQty <= 0) {
    removeFromCart(index);
  } else {
    product.stock += item.qty;
    item.qty = newQty;
    product.stock -= newQty;
  }

  localStorage.setItem('products_v27', JSON.stringify(products));
  localStorage.setItem('cart_v27', JSON.stringify(cart));
  renderCart();
  renderProducts();
  updateCartCount();
}

function removeFromCart(index) {
  const item = cart[index];
  const product = products.find(p => p.id === item.id);
  if (product) product.stock += item.qty;

  cart.splice(index, 1);

  localStorage.setItem('products_v27', JSON.stringify(products));
  localStorage.setItem('cart_v27', JSON.stringify(cart));
  renderCart();
  renderProducts();
  updateCartCount();
}

function sendToWhatsapp() {
  if (cart.length === 0) return alert("El carrito está vacío");

  let text = "Hola, quiero hacer este pedido:\n\n";
  let total = 0;
  cart.forEach(item => {
    const subtotal = (item.price || 0) * (item.qty || 1);
    text += `• ${item.title} x${item.qty} = ${subtotal.toFixed(2)} Bs\n`;
    total += subtotal;
  });
  text += `\nTotal: ${total.toFixed(2)} Bs`;

  const phone = "59163882223";
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, "_blank");
}

// ==================== ADMIN ====================
document.getElementById('adminToggleBtn').addEventListener('click', () => {
  adminMode = !adminMode;
  document.getElementById('adminToggleBtn').textContent = `Modo Admin: ${adminMode ? 'ON' : 'OFF'}`;
  document.body.classList.toggle('admin-on', adminMode);
  document.getElementById('openAddBtn').classList.toggle('admin-only', !adminMode);
  renderProducts();
});

document.getElementById('openAddBtn').addEventListener('click', () => {
  editingId = null;
  document.getElementById('dialogTitle').textContent = "Agregar Producto";
  document.getElementById('productForm').reset();
  document.getElementById('productDialog').showModal();
});

document.getElementById('productForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const newProduct = {
    id: editingId || "prod_" + Date.now(),
    title: document.getElementById('title').value.trim(),
    fontStyle: document.getElementById('fontStyle').value,
    category: document.getElementById('category').value.trim(),
    price: parseFloat(document.getElementById('price').value) || 0,
    offerPrice: parseFloat(document.getElementById('offerPrice').value) || 0,
    wholesalePrice: parseFloat(document.getElementById('wholesalePrice').value) || 0,
    stock: parseInt(document.getElementById('stock').value) || 0,
    description: document.getElementById('description').value.trim(),
    media: document.getElementById('mediaLinks').value.split('\n').map(l => l.trim()).filter(Boolean)
  };

  if (editingId) {
    products = products.map(p => p.id === editingId ? newProduct : p);
  } else {
    products.unshift(newProduct);
  }

  localStorage.setItem('products_v27', JSON.stringify(products));
  renderProducts();
  closeDialog();
});

function closeDialog() {
  document.getElementById('productDialog').close();
  editingId = null;
}

function editProduct(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;

  editingId = id;
  document.getElementById('dialogTitle').textContent = "Editar Producto";

  document.getElementById('title').value = product.title || '';
  document.getElementById('fontStyle').value = product.fontStyle || 'font-style-1';
  document.getElementById('category').value = product.category || '';
  document.getElementById('price').value = product.price || '';
  document.getElementById('offerPrice').value = product.offerPrice || '';
  document.getElementById('wholesalePrice').value = product.wholesalePrice || '';
  document.getElementById('stock').value = product.stock || '';
  document.getElementById('description').value = product.description || '';
  document.getElementById('mediaLinks').value = (product.media || []).join('\n');

  document.getElementById('productDialog').showModal();
}

function deleteProduct(id) {
  if (confirm("¿Eliminar este producto?")) {
    products = products.filter(p => p.id !== id);
    cart = cart.filter(item => item.id !== id);
    localStorage.setItem('products_v27', JSON.stringify(products));
    localStorage.setItem('cart_v27', JSON.stringify(cart));
    renderProducts();
  }
}

document.getElementById('cartBtn').addEventListener('click', () => {
  document.getElementById('cartPanel').classList.toggle('open');
  renderCart();
});

renderProducts();
</script>
</body>
</html>
